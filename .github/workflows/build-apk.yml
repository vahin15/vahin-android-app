name: Build Signed Android APK

# Runs automatically every time you push to the main branch,
# and can also be triggered manually from the GitHub Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Sync Capacitor web assets into Android project
        run: npx cap sync android

      - name: Decode signing keystore from secret
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore/release.keystore

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build signed release AAB (for Play Store, built later when you're ready)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload APK (install this on your phone now)
        uses: actions/upload-artifact@v4
        with:
          name: vahin-connect-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB (use this later for Play Store upload)
        uses: actions/upload-artifact@v4
        with:
          name: vahin-connect-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
